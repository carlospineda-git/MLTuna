<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ML Tuna - Security</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

    <header class="auth-header">
        <div class="brand-text">
            <h2 class="brand-logo">⚡ ML Tuna</h2>
        </div>
    </header>

    <main class="auth-container">
        <div class="card glass animate-on-load delay-1 auth-card">
            <h2 class="auth-title">Update Password</h2>
            <p class="text-muted auth-subtitle">Secure your account with a strong password.</p>

            <div class="input-group">
                <input type="password" id="newPassword" class="auth-input" placeholder="New Password" required />
                <div class="strength-meter">
                    <div id="strengthBar" class="strength-bar"></div>
                </div>
                <p id="strengthText" class="strength-text">Strength: Weak</p>
            </div>

            <button id="updateBtn" class="auth-btn">
                <span class="btn-text">SAVE CHANGES</span>
            </button>

            <div id="status" class="status-message"></div>
            
            <div class="security-note">
                <p>⚠️ Use at least 6 characters including numbers and symbols for better protection.</p>
            </div>
        </div>
    </main>

    <script src="update.js"></script>
</body>
</html>
