<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ML Tuna - Sign Up</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

    <header class="auth-header">
        <div class="brand-text">
            <h2 class="brand-logo">⚡ ML Tuna</h2>
        </div>
    </header>

    <main class="auth-container">
        <div class="card glass animate-on-load delay-1 auth-card">
            <h2 class="auth-title">Create Account</h2>
            <p class="text-muted auth-subtitle">Join the elite optimized players.</p>

            <div class="input-group">
                <input type="email" id="email" class="auth-input" placeholder="Email Address" required />
            </div>
            
            <div class="input-group">
                <input type="password" id="password" class="auth-input" placeholder="Password" required />
            </div>

            <button id="signUpBtn" class="auth-btn">
                <span class="btn-text">SIGN UP</span>
            </button>

            <div id="status" class="status-message"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        emailjs.init("fZ4GIJG7hr3XHbPq6");
    </script>
    <script src="script.js"></script>
</body>
</html>
