<!DOCTYPE html>
<html>
<head>
  <title>Confirming...</title>
</head>
<body style="background:#0f172a;color:white;text-align:center;margin-top:100px;">

<h2>Verifying your account...</h2>

<script>
  async function verify() {
    const url = new URL(window.location.href);

    const token = url.searchParams.get("token");

    // ❌ No token
    if (!token) {
        document.body.innerHTML = "<h2>Token not found</h2>";
        return;
    }

    try {
        const res = await fetch(
            `https://hflxahfkrzmiufhqagul.supabase.co/rest/v1/invites?token=eq.${token}`,
            {
                headers: {
                    "Content-Type": "application/json",
                    "apikey": "sb_publishable_QglNYbjZZzMQ7fckuYH-kA_QqBPuvmu",
                    "Authorization": "Bearer sb_publishable_QglNYbjZZzMQ7fckuYH-kA_QqBPuvmu"
                }
            }
        );

        const data = await res.json();
        const invite = data[0];

        // ✅ VALID → redirect
        window.location.href = "/welcome.html";

    } catch (err) {
        document.body.innerHTML = "<h2>Connection error</h2>";
        console.error(err);
    }
}

verify();
</script>

</body>
</html>
